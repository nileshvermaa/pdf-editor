# Render blueprint — AeroPDF backend (FastAPI + PyMuPDF).
# Deploy: https://render.com → New → Blueprint → point at this repo.
# The frontend is deployed separately on Vercel (see vercel.json + README).

services:
  - type: web
    name: aeropdf-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Set this to your Vercel frontend URL (no trailing slash).
      # Copy it from the Vercel dashboard after your first frontend deploy.
      - key: AEROPDF_ALLOWED_ORIGINS
        value: https://your-app.vercel.app
      - key: AEROPDF_JSON_LOGS
        value: "true"
    # Free plan: no persistent disk — sessions live in ephemeral storage.
    # Undo/redo history resets on each deploy/restart.
    # To persist history, upgrade to a paid plan and uncomment below:
    #   envVars:
    #     - key: AEROPDF_TEMP_DIR
    #       value: /var/data/aeropdf_sessions
    #   disk:
    #     name: aeropdf-data
    #     mountPath: /var/data
    #     sizeGB: 1
